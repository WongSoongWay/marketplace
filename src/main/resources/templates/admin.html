<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Panel</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    h1, h2 {
        text-align: center;
    }

    /* Product Grid */
    .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    }

    .product-card {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .product-card img {
        max-width: 150px;
        margin-bottom: 10px;
    }

    .product-info {
        text-align: center;
        margin-bottom: 10px;
    }

    .product-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
    }

    .product-buttons button {
        padding: 8px;
        font-size: 14px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
    }

    .hide-btn { background-color: #6c757d; color: white; }
    .update-btn { background-color: #007bff; color: white; }
    .delete-btn { background-color: red; color: white; }

    /* Add Product Form */
    .add-product-form {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
    }

    .add-product-form label {
        display: block;
        margin-top: 10px;
    }

    .add-product-form input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    .add-product-form button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
    }
  </style>
</head>
<body>
<a href="/orders">Orders</a>
<a href="/">Home</a>

<h1>Admin Panel</h1>

<h2>Products</h2>

<div class="product-grid">

  <div class="product-card" th:each="product : ${products}">

    <div class="product-info">
      <p><strong th:text="${product.name}"></strong></p>
      <p th:text="${product.price}"></p>
      <img th:src="${product.imageUrl}" width="150">
    </div>

    <div class="product-buttons">

      <form th:action="@{/admin/toggle-visibility/{id}(id=${product.id})}"
            method="post">
        <button type="submit" class="hide-btn">
          <span th:text="${product.visible} ? 'Hide' : 'Show'"></span>
        </button>
      </form>

      <a th:href="@{/admin/edit/{id}(id=${product.id})}">
        <button type="button" class="update-btn">Update</button>
      </a>

      <form th:action="@{/admin/delete/{id}(id=${product.id})}"
            method="post">
        <button type="submit" class="delete-btn">Delete</button>
      </form>

    </div>

  </div>

</div>

<br/><br/>
<form th:action="@{/admin/add-product}" th:object="${product}" method="post" class="add-product-form">
  <h2>Add Product</h2>

  <label>Name</label>
  <input type="text" th:field="*{name}" required>

  <label>Price</label>
  <input type="number" step="0.01" th:field="*{price}" required>

  <label>Description</label>
  <input type="text" th:field="*{description}">

  <label>Image URL</label>
  <input type="text" th:field="*{imageUrl}">

  <button type="submit">Add Product</button>
</form>

</body>
</html>
