<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>
<a href="/">Home</a>


<h2>Products</h2>

<div th:each="product : ${products}">
  <p th:text="${product.name}"></p>
  <p th:text="${product.price}"></p>
  <img th:src="${product.imageUrl}" width="200">

  <a th:href="@{/admin/edit/{id}(id=${product.id})}">
    <button type="button">Update</button>
  </a>

  <form th:action="@{/admin/delete/{id}(id=${product.id})}" method="post">
    <button type="submit" style="background-color:red; color:white;">Delete</button>
  </form>

  <form th:action="@{/admin/toggle-visibility/{id}(id=${product.id})}"
        method="post"
        style="display:inline;">

    <button type="submit">
      <span th:text="${product.visible} ? 'Hide' : 'Show'"></span>
    </button>

  </form>
</div>


<form th:action="@{/admin/add-product}" th:object="${product}" method="post">

  <label>Name</label>
  <input type="text" th:field="*{name}" required>
  <br><br>

  <label>Price</label>
  <input type="number" step="0.01" th:field="*{price}" required>
  <br><br>

  <label>Description</label>
  <input type="text" th:field="*{description}">
  <br><br>

  <label>Image URL</label>
  <input type="text" th:field="*{imageUrl}">
  <br><br>

  <button type="submit">Add Product</button>

</form>

</body>
</html>
