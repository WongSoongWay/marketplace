<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart</title>
    <style>
        body {
            font-family: sans-serif;
        }

        .cart-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr) 1fr; /* 3 products + summary */
            gap: 20px;
            padding: 40px;
        }

        .cart-item-card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .cart-item-card img {
            width: 100%;
            max-width: 150px;
            margin-bottom: 10px;
        }

        .cart-item-name {
            font-weight: bold;
            min-height: 40px;
            margin-bottom: 10px;
        }

        .cart-item-bottom {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .quantity-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .quantity-selector input {
            width: 50px;
            text-align: center;
        }

        .quantity-selector button {
            width: 30px;
            height: 30px;
            font-size: 18px;
        }

        .remove-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
        }

        .cart-summary {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .cart-summary h2 {
            margin-top: 0;
        }

        .checkout-btn {
            padding: 10px;
            margin-top: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cart-container > .cart-summary {
            grid-column: 4 / 5;
        }
    </style>
</head>
<body>
<a href="/">Home</a>
<h1>Your Cart</h1>

<div class="cart-container">

    <!-- Cart items -->
    <div class="cart-item-card" th:if="${item.isVisible()}" th:each="item : ${cartItems}">
            <p class="cart-item-name" th:text="${item.product.name}"></p>
            <img th:src="${item.product.imageUrl}" alt="Product Image">

            <div class="cart-item-bottom">
                <p>Price: $<span th:text="${item.product.price}"></span></p>

                <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="cart-form">
                    <div class="quantity-selector">
                        <button type="button" class="decrease">-</button>
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"/>
                        <button type="button" class="increase">+</button>
                    </div>

                    <button class="remove-btn" type="submit" name="action" value="remove">Remove</button>
                </form>

                <p>Subtotal: $<span th:text="${#numbers.formatDecimal(item.product.price * item.quantity,1,2)}"></span></p>
            </div>
        </div>

        <script>
            document.querySelectorAll(".cart-form").forEach(form => {
                const input = form.querySelector("input[name='quantity']");
                const decrease = form.querySelector(".decrease");
                const increase = form.querySelector(".increase");

                // Plus/minus buttons
                decrease.addEventListener("click", () => {
                    let actionInput = document.createElement("input");
                    actionInput.type = "hidden";
                    actionInput.name = "action";
                    actionInput.value = "decrease";
                    form.appendChild(actionInput);
                    form.submit();
                });

                increase.addEventListener("click", () => {
                    let actionInput = document.createElement("input");
                    actionInput.type = "hidden";
                    actionInput.name = "action";
                    actionInput.value = "increase";
                    form.appendChild(actionInput);
                    form.submit();
                });

                // Enter key to update quantity
                input.addEventListener("keydown", (e) => {
                    if(e.key === "Enter") {
                        e.preventDefault();
                        let actionInput = document.createElement("input");
                        actionInput.type = "hidden";
                        actionInput.name = "action";
                        actionInput.value = "update";
                        form.appendChild(actionInput);
                        form.submit();
                    }
                });
            });
        </script>

    <!-- Cart summary -->
    <div class="cart-summary">
        <h2>Cart Summary</h2>
        <p>Total Items: <span th:text="${totalQuantity}"></span></p>
        <p>Total Price: $<span th:text="${total}"></span></p>
        <form th:action="@{/cart/checkout}" method="post">
            <button class="checkout-btn" type="submit">Checkout</button>
        </form>
        <p th:if="${#lists.size(cartItems) == 0}">Your cart is empty</p>
    </div>

</div>

</body>
</html>
