<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Orders</title>
</head>
<body>
<a href="/">Home</a>
<h1>Orders</h1>
<table border="1" cellpadding="5" cellspacing="0">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Update Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${orders}">
        <td th:text="${entry.key}"></td>
        <td th:text="${entry.value}"></td>
        <td>
            <form th:action="@{/orders/update-status/{orderId}(orderId=${entry.key})}" method="post">
                <select name="status">
                    <option value="Confirmed" th:selected="${entry.value == 'Confirmed'}">Confirmed</option>
                    <option value="Shipped" th:selected="${entry.value == 'Shipped'}">Shipped</option>
                    <option value="Completed" th:selected="${entry.value == 'Completed'}">Completed</option>
                </select>
                <button type="submit">Update</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
